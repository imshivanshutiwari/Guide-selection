{% extends "base.html" %}
{% block title %}Error {{ code }}{% endblock %}
{% block content %}
<div class="error-container">
    <div>
        <div class="error-code">{{ code }}</div>
        <p class="error-message">{{ message }}</p>
        <a href="{{ url_for('dashboard') }}" class="btn btn-primary">← Back to Dashboard</a>
    </div>
</div>
{% endblock %}
